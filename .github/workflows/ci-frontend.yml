name: CI — Frontend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Lint (ESLint)
        run: npm run lint
        continue-on-error: true

      - name: 🏗️ Build de producción
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3001

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: .output/
          retention-days: 5

  type-checking:
    name: 🔍 Type Checking
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: ✔️ TypeScript type checking
        run: npx tsc --noEmit
        continue-on-error: true

  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔐 Audit de dependencias
        run: npm audit --audit-level=moderate
        continue-on-error: true

  notifications:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [lint-and-build, type-checking, security-scan]
    if: always()
    
    steps:
      - name: ✅ Build Success
        if: success()
        run: echo "✅ Frontend CI pipeline completed successfully!"
      
      - name: ❌ Build Failed
        if: failure()
        run: echo "❌ Frontend CI pipeline failed. Check logs for details." && exit 1
